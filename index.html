<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warrior Target Clock</title>
    <style>
        :root {
            --apple-glass: rgba(22, 22, 30, 0.45);
            --apple-glass-hover: rgba(32, 32, 45, 0.55);
            --apple-border: rgba(255, 255, 255, 0.12);
            --apple-border-hover: rgba(255, 255, 255, 0.22);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0;
            background: #0d0f14;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            padding: 40px;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Deep Ambient Background Layers */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: 
                radial-gradient(circle at 20% 30%, #1e2942 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, #16222f 0%, transparent 45%),
                radial-gradient(circle at 50% 80%, #111a2e 0%, transparent 50%);
            z-index: -2;
        }

        /* Clean Glass Container */
        .glass {
            background: var(--apple-glass);
            backdrop-filter: blur(35px) saturate(160%);
            -webkit-backdrop-filter: blur(35px) saturate(160%);
            border: 1px solid var(--apple-border);
            border-radius: 24px;
            padding: 50px 60px;
            box-sizing: border-box;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.25), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            max-width: 700px;
            width: 100%;
            text-align: center;
        }
        
        .glass:hover {
            transform: translateY(-2px);
            background: var(--apple-glass-hover);
            border-color: var(--apple-border-hover);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1.main-title {
            margin-top: 0;
            margin-bottom: 40px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        /* Streamlined Stacked Matrix Elements */
        .matrix-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .matrix-row {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 16px;
            width: 100%;
        }

        .matrix-num {
            font-size: 58px;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1;
            text-align: right;
            min-width: 260px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            color: var(--text-primary);
        }

        .matrix-label {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.5px;
            text-align: left;
            min-width: 100px;
            color: var(--text-secondary);
        }

        /* Inline Sequence Breakdown Strip Pill */
        .inline-strip-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 12px;
        }

        .inline-badge {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.2px;
            background: rgba(0, 0, 0, 0.25);
            color: var(--text-secondary);
            padding: 8px 22px;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .inline-badge span {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
            font-weight: 700;
            color: var(--text-primary);
        }

        .inline-badge .lbl-rem {
            color: var(--text-muted);
            margin-left: 4px;
        }

        @media (max-width: 600px) {
            body { padding: 20px; }
            .glass { padding: 36px 24px; }
            .matrix-num { font-size: 40px; min-width: 180px; }
            .matrix-label { font-size: 18px; min-width: 80px; }
            .inline-badge { font-size: 12px; padding: 6px 16px; }
        }
    </style>
</head>
<body>

    <div class="glass">
        <h1 class="main-title">Warrior Target Clock</h1>
        
        <div class="matrix-stack">
            <div class="matrix-row">
                <span class="matrix-num" id="daysTotal">---</span>
                <span class="matrix-label">days</span>
            </div>

            <div class="matrix-row">
                <span class="matrix-num" id="hoursTotal">---</span>
                <span class="matrix-label">hours</span>
            </div>

            <div class="matrix-row">
                <span class="matrix-num" id="minutesTotal">---</span>
                <span class="matrix-label">minutes</span>
            </div>

            <div class="matrix-row">
                <span class="matrix-num" id="secondsTotal">---</span>
                <span class="matrix-label">seconds</span>
            </div>
        </div>

        <div class="inline-strip-wrapper">
            <div class="inline-badge" id="compositeString">
                Calculating...
            </div>
        </div>
    </div>

    <script>
        // Absolute Target Bound Anchor: May 2, 2027, 00:00:00 AM
        const TARGET_EPOCH = new Date(2027, 4, 2, 0, 0, 0, 0).getTime();

        function calculateTimeline() {
            const now = Date.now();
            const deltaMs = TARGET_EPOCH - now;

            const daysDisplay = document.getElementById("daysTotal");
            const hoursDisplay = document.getElementById("hoursTotal");
            const minutesDisplay = document.getElementById("minutesTotal");
            const secondsDisplay = document.getElementById("secondsTotal");
            const compositeDisplay = document.getElementById("compositeString");

            if (deltaMs <= 0) {
                daysDisplay.textContent = "0";
                hoursDisplay.textContent = "0";
                minutesDisplay.textContent = "0";
                secondsDisplay.textContent = "0";
                compositeDisplay.innerHTML = "⏱️ <span>0d</span> , <span>0h</span> , <span>0m</span> , <span>0s</span> <span class='lbl-rem'>remaining</span>";
                return;
            }

            // Raw Absolute Continuous Counters
            const totalSeconds = Math.floor(deltaMs / 1000);
            const totalMinutes = Math.floor(deltaMs / (1000 * 60));
            const totalHours = Math.floor(deltaMs / (1000 * 60 * 60));
            const totalDays = Math.floor(deltaMs / (1000 * 60 * 60 * 24));

            // Standard Modulo Breakdown Alignment for Pill Element
            const standardDaysBreakdown = totalDays;
            const standardHoursBreakdown = Math.floor((deltaMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const standardMinutesBreakdown = Math.floor((deltaMs % (1000 * 60 * 60)) / (1000 * 60));
            const standardSecondsBreakdown = Math.floor((deltaMs % (1000 * 60)) / 1000);

            // Commit values to core template segments
            daysDisplay.textContent = totalDays.toLocaleString();
            hoursDisplay.textContent = totalHours.toLocaleString();
            minutesDisplay.textContent = totalMinutes.toLocaleString();
            secondsDisplay.textContent = totalSeconds.toLocaleString();

            // Format precise markup matching the required pill styling layout
            compositeDisplay.innerHTML = `⏱️ <span>${standardDaysBreakdown}d</span> , <span>${standardHoursBreakdown}h</span> , <span>${standardMinutesBreakdown}m</span> , <span>${standardSecondsBreakdown}s</span> <span class="lbl-rem">remaining</span>`;
        }

        // Loop engine cycles continuously
        calculateTimeline();
        setInterval(calculateTimeline, 250);
    </script>
</body>
</html>
