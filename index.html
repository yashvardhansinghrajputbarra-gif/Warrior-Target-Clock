<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warrior Target Clock</title>
    <style>
        :root {
            --glass-bg: rgba(20, 24, 33, 0.65);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --text-pill: rgba(255, 255, 255, 0.35);
        }

        body {
            margin: 0;
            background: #090b0e;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Complex Fluid Depth Background Layers */
        body::before {
            content: "";
            position: absolute;
            top: -30%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: 
                radial-gradient(circle at 10% 20%, #151d2a 0%, transparent 45%),
                radial-gradient(circle at 90% 10%, #1c2637 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #0d121a 0%, #090b0e 70%);
            z-index: -2;
        }

        body::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.015) 0%, rgba(0,0,0,0) 70%);
            top: 15%;
            left: 25%;
            z-index: -1;
            filter: blur(60px);
            pointer-events: none;
        }

        /* High-Fidelity Liquid Glass Container */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.12); /* Glossy top edge highlight */
            border-radius: 36px;
            padding: 65px 75px;
            width: 100%;
            max-width: 640px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
            
            /* Multi-layered shadow architecture for true structural weight */
            box-shadow: 
                0 4px 24px -1px rgba(0, 0, 0, 0.3),
                0 25px 55px -5px rgba(0, 0, 0, 0.45),
                0 40px 90px -10px rgba(0, 0, 0, 0.6),
                inset 0 1px 0px rgba(255, 255, 255, 0.1);
        }

        .main-title {
            margin: 0 0 50px 0;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.45);
            text-transform: uppercase;
        }

        /* Matrix Elements Layout Grid/Stack */
        .matrix-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 45px;
        }

        .matrix-row {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 16px;
            width: 100%;
        }

        .matrix-num {
            font-size: 66px;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            text-align: right;
            min-width: 290px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            color: var(--text-main);
            /* Crisp surface texture offset */
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
        }

        .matrix-label {
            font-size: 19px;
            font-weight: 400;
            letter-spacing: 0px;
            text-align: left;
            min-width: 80px;
            color: var(--text-dim);
        }

        /* High-End Clean Composite Sequence Pill */
        .pill-container {
            display: flex;
            justify-content: center;
        }

        .pill {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            background: rgba(10, 12, 17, 0.6);
            color: rgba(255, 255, 255, 0.65);
            padding: 8px 24px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.2),
                inset 0 1px 1px rgba(0, 0, 0, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .pill span {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
            font-weight: 700;
            color: var(--text-main);
        }

        .pill .lbl-rem {
            color: var(--text-pill);
            margin-left: 3px;
            font-weight: 400;
        }

        @media (max-width: 600px) {
            .glass-panel { padding: 45px 24px; border-radius: 28px; }
            .matrix-num { font-size: 46px; min-width: 210px; }
            .matrix-label { font-size: 16px; min-width: 60px; }
            .pill { font-size: 11px; padding: 7px 18px; }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1 class="main-title">Warrior Target Clock</h1>
        
        <div class="matrix-stack">
            <div class="matrix-row">
                <span class="matrix-num" id="daysTotal">---</span>
                <span class="matrix-label">days</span>
            </div>

            <div class="matrix-row">
                <span class="matrix-num" id="hoursTotal">---</span>
                <span class="matrix-label">hours</span>
            </div>

            <div class="matrix-row">
                <span class="matrix-num" id="minutesTotal">---</span>
                <span class="matrix-label">minutes</span>
            </div>

            <div class="matrix-row">
                <span class="matrix-num" id="secondsTotal">---</span>
                <span class="matrix-label">seconds</span>
            </div>
        </div>

        <div class="pill-container">
            <div class="pill" id="compositeString">
                Calculating remaining alignment...
            </div>
        </div>
    </div>

    <script>
        // System Destination Target: May 2, 2027, 00:00:00 AM Absolute Time
        const TARGET_EPOCH = new Date(2027, 4, 2, 0, 0, 0, 0).getTime();

        function syncEngine() {
            const now = Date.now();
            const deltaMs = TARGET_EPOCH - now;

            const daysDisplay = document.getElementById("daysTotal");
            const hoursDisplay = document.getElementById("hoursTotal");
            const minutesDisplay = document.getElementById("minutesTotal");
            const secondsDisplay = document.getElementById("secondsTotal");
            const compositeDisplay = document.getElementById("compositeString");

            if (deltaMs <= 0) {
                daysDisplay.textContent = "0";
                hoursDisplay.textContent = "0";
                minutesDisplay.textContent = "0";
                secondsDisplay.textContent = "0";
                compositeDisplay.innerHTML = "⏱️ <span>0d</span> , <span>0h</span> , <span>0m</span> , <span>0s</span> <span class='lbl-rem'>remaining</span>";
                return;
            }

            // Raw Continuum Totals Arithmetic calculations
            const totalSeconds = Math.floor(deltaMs / 1000);
            const totalMinutes = Math.floor(deltaMs / (1000 * 60));
            const totalHours = Math.floor(deltaMs / (1000 * 60 * 60));
            const totalDays = Math.floor(deltaMs / (1000 * 60 * 60 * 24));

            // Classical Breakdown Modulo Arithmetic Sequence
            const standardDaysBreakdown = totalDays;
            const standardHoursBreakdown = Math.floor((deltaMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const standardMinutesBreakdown = Math.floor((deltaMs % (1000 * 60 * 60)) / (1000 * 60));
            const standardSecondsBreakdown = Math.floor((deltaMs % (1000 * 60)) / 1000);

            // Populate Main Document Fragments with Locale formatting separators
            daysDisplay.textContent = totalDays.toLocaleString();
            hoursDisplay.textContent = totalHours.toLocaleString();
            minutesDisplay.textContent = totalMinutes.toLocaleString();
            secondsDisplay.textContent = totalSeconds.toLocaleString();

            // Commit to inline summary layout pill frame
            compositeDisplay.innerHTML = `⏱️ <span>${standardDaysBreakdown}d</span> , <span>${standardHoursBreakdown}h</span> , <span>${standardMinutesBreakdown}m</span> , <span>${standardSecondsBreakdown}s</span> <span class="lbl-rem">remaining</span>`;
        }

        // Run instantly and scale update interval window for optimal layout performance
        syncEngine();
        setInterval(syncEngine, 200);
    </script>
</body>
</html>
